<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Secure File Encryption Tool</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;
margin:0;
height:100vh;

background:linear-gradient(135deg,#1e293b,#0f172a,#020617);

display:flex;
justify-content:center;
align-items:center;

color:white;

}

.container{

width:420px;
padding:35px;

border-radius:16px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);

box-shadow:0 10px 40px rgba(0,0,0,0.6);

text-align:center;

}

h1{

margin-top:0;
font-weight:600;

}

.subtitle{

font-size:13px;
opacity:0.7;
margin-bottom:20px;

}

.drop-zone{

border:2px dashed #38bdf8;

border-radius:12px;

padding:40px 20px;

cursor:pointer;

transition:0.25s;

}

.drop-zone:hover{

background:rgba(56,189,248,0.1);

}

.drop-zone.dragover{

background:#38bdf8;
color:black;

}

.file-name{

margin-top:10px;
font-size:13px;
opacity:0.8;

}

input{

width:100%;

padding:12px;

margin-top:18px;

border:none;

border-radius:8px;

outline:none;

background:#0f172a;

color:white;

}

.buttons{

display:flex;
gap:10px;
margin-top:20px;

}

button{

flex:1;

padding:12px;

border:none;

border-radius:8px;

font-weight:600;

cursor:pointer;

transition:0.2s;

}

.encrypt{

background:#22c55e;
color:white;

}

.encrypt:hover{

transform:translateY(-2px);
background:#16a34a;

}

.decrypt{

background:#38bdf8;
color:black;

}

.decrypt:hover{

transform:translateY(-2px);
background:#0ea5e9;

}

.status{

margin-top:18px;

font-size:13px;

opacity:0.8;

}

.footer{

margin-top:25px;
font-size:11px;
opacity:0.5;

}

</style>

</head>

<body>

<div class="container">

<h1>File Encryption Tool</h1>

<div class="subtitle">
Secure AES-256 browser encryption
</div>

<div class="drop-zone" id="dropZone">

Drag & Drop File  
<br><br>
<span style="font-size:12px;opacity:0.7;">or click to choose</span>

<div class="file-name" id="fileName"></div>

</div>

<input type="file" id="fileInput" hidden>

<input type="password" id="password" placeholder="Enter password">

<div class="buttons">

<button class="encrypt" onclick="encryptFile()">Encrypt</button>

<button class="decrypt" onclick="decryptFile()">Decrypt</button>

</div>

<div class="status" id="status"></div>

<div class="footer">
Client-side encryption • No files uploaded
</div>

</div>

<script>

let selectedFile=null;

const dropZone=document.getElementById("dropZone");
const fileInput=document.getElementById("fileInput");
const fileName=document.getElementById("fileName");
const statusText=document.getElementById("status");

dropZone.addEventListener("click",()=>{

fileInput.click();

});

fileInput.addEventListener("change",()=>{

selectedFile=fileInput.files[0];

fileName.innerText=selectedFile.name;

});

dropZone.addEventListener("dragover",(e)=>{

e.preventDefault();

dropZone.classList.add("dragover");

});

dropZone.addEventListener("dragleave",()=>{

dropZone.classList.remove("dragover");

});

dropZone.addEventListener("drop",(e)=>{

e.preventDefault();

dropZone.classList.remove("dragover");

selectedFile=e.dataTransfer.files[0];

fileName.innerText=selectedFile.name;

});

async function getKey(password){

const enc=new TextEncoder();

const keyMaterial=await crypto.subtle.importKey(

"raw",

enc.encode(password),

{name:"PBKDF2"},

false,

["deriveKey"]

);

return crypto.subtle.deriveKey(

{

name:"PBKDF2",

salt:enc.encode("file-encryption-salt"),

iterations:100000,

hash:"SHA-256"

},

keyMaterial,

{name:"AES-GCM",length:256},

false,

["encrypt","decrypt"]

);

}

async function encryptFile(){

if(!selectedFile){

alert("Select a file first");

return;

}

const password=document.getElementById("password").value;

if(password===""){

alert("Enter password");

return;

}

statusText.innerText="Encrypting file...";

const key=await getKey(password);

const iv=crypto.getRandomValues(new Uint8Array(12));

const fileData=await selectedFile.arrayBuffer();

const encrypted=await crypto.subtle.encrypt(

{name:"AES-GCM",iv:iv},

key,

fileData

);

const blob=new Blob([iv,new Uint8Array(encrypted)]);

download(blob,selectedFile.name+".enc");

statusText.innerText="Encryption complete";

}

async function decryptFile(){

if(!selectedFile){

alert("Select encrypted file");

return;

}

const password=document.getElementById("password").value;

if(password===""){

alert("Enter password");

return;

}

statusText.innerText="Decrypting file...";

try{

const key=await getKey(password);

const data=new Uint8Array(await selectedFile.arrayBuffer());

const iv=data.slice(0,12);

const encrypted=data.slice(12);

const decrypted=await crypto.subtle.decrypt(

{name:"AES-GCM",iv:iv},

key,

encrypted

);

const blob=new Blob([decrypted]);

download(blob,"decrypted_"+selectedFile.name.replace(".enc",""));

statusText.innerText="Decryption complete";

}

catch{

alert("Wrong password or corrupted file");

statusText.innerText="";

}

}

function download(blob,name){

const a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download=name;

a.click();

}

</script>

</body>

</html>
