<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Secure File Encryption Tool</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#1e293b;
padding:40px;
border-radius:12px;
width:420px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
margin-bottom:20px;
}

.drop-zone{
border:2px dashed #38bdf8;
padding:40px;
border-radius:10px;
margin-bottom:20px;
cursor:pointer;
transition:0.2s;
}

.drop-zone:hover{
background:#0ea5e933;
}

.drop-zone.dragover{
background:#0ea5e9;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:none;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:6px;
background:#38bdf8;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

.status{
margin-top:15px;
font-size:14px;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="container">

<h1>File Encryption Tool</h1>

<div class="drop-zone" id="dropZone">
Drag & Drop File Here<br>
<span style="font-size:12px;">or click to select file</span>
</div>

<input type="file" id="fileInput" hidden>

<input type="password" id="password" placeholder="Enter Password">

<br>

<button onclick="encryptFile()">Encrypt</button>
<button onclick="decryptFile()">Decrypt</button>

<div class="status" id="status"></div>

</div>

<script>

let selectedFile = null;

const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const statusText = document.getElementById("status");

dropZone.addEventListener("click", () => {
fileInput.click();
});

fileInput.addEventListener("change", () => {
selectedFile = fileInput.files[0];
dropZone.innerHTML = "Selected: <br>" + selectedFile.name;
});

dropZone.addEventListener("dragover", (e) => {
e.preventDefault();
dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", () => {
dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", (e) => {
e.preventDefault();
dropZone.classList.remove("dragover");

selectedFile = e.dataTransfer.files[0];
dropZone.innerHTML = "Selected: <br>" + selectedFile.name;
});

async function getKey(password){

const enc = new TextEncoder();

const keyMaterial = await crypto.subtle.importKey(
"raw",
enc.encode(password),
{name:"PBKDF2"},
false,
["deriveKey"]
);

return crypto.subtle.deriveKey(
{
name:"PBKDF2",
salt:enc.encode("file-encryption-salt"),
iterations:100000,
hash:"SHA-256"
},
keyMaterial,
{name:"AES-GCM",length:256},
false,
["encrypt","decrypt"]
);

}

async function encryptFile(){

if(!selectedFile){
alert("Select or drop a file first");
return;
}

const password = document.getElementById("password").value;

if(password === ""){
alert("Enter password");
return;
}

statusText.innerText = "Encrypting...";

const key = await getKey(password);

const iv = crypto.getRandomValues(new Uint8Array(12));

const fileData = await selectedFile.arrayBuffer();

const encrypted = await crypto.subtle.encrypt(
{name:"AES-GCM",iv:iv},
key,
fileData
);

const blob = new Blob([iv,new Uint8Array(encrypted)]);

download(blob,selectedFile.name + ".enc");

statusText.innerText = "Encryption complete";

}

async function decryptFile(){

if(!selectedFile){
alert("Select encrypted file first");
return;
}

const password = document.getElementById("password").value;

if(password === ""){
alert("Enter password");
return;
}

statusText.innerText = "Decrypting...";

try{

const key = await getKey(password);

const data = new Uint8Array(await selectedFile.arrayBuffer());

const iv = data.slice(0,12);
const encrypted = data.slice(12);

const decrypted = await crypto.subtle.decrypt(
{name:"AES-GCM",iv:iv},
key,
encrypted
);

const blob = new Blob([decrypted]);

download(blob,"decrypted_" + selectedFile.name.replace(".enc",""));

statusText.innerText = "Decryption complete";

}catch(e){

alert("Wrong password or corrupted file");
statusText.innerText = "";

}

}

function download(blob,name){

const a = document.createElement("a");

a.href = URL.createObjectURL(blob);
a.download = name;

a.click();

}

</script>

</body>

</html>
